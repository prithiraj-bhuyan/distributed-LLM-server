apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-server
  labels:
    app: generic-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: generic-app
  template:
    metadata:
      labels:
        app: generic-app
    spec:
      containers:
        - name: app-container
          image: cloudnativeacr2.azurecr.io/llm:latest # {"$imagepolicy": "flux-system:llmimagepol"}
          ports:
            - containerPort: 8000
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthcheck
              port: 8000
            failureThreshold: 5
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 8000
            failureThreshold: 1
            periodSeconds: 3